<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=600, height=600, initial-scale=1, user-scalable=no">
  <meta name="mrbd-web-app-capable" content="yes">
  <meta name="description" content="Live Citi Bike availability as AR waypoints — find bikes and docks fast.">
  <title>Waypoint AR — Citi Bike</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="app">
    <!-- Mode selector: BIKES / DOCKS / START rotating toggle (always visible) -->
    <div id="mode-selector">
      <div id="mode-track">
        <div class="mode-item">START</div>
        <div class="mode-item mode-toggle-item">
          <div class="tgl-track"><div class="tgl-thumb"></div></div>
          <span class="tgl-mode-label">BIKES</span>
        </div>
        <div class="mode-item mode-toggle-item mode-view-toggle">
          <div class="tgl-track"><div class="tgl-thumb"></div></div>
          <span class="tgl-mode-label">LIST</span>
        </div>
        <div class="mode-item">START</div>
        <div class="mode-item mode-toggle-item">
          <div class="tgl-track"><div class="tgl-thumb"></div></div>
          <span class="tgl-mode-label">BIKES</span>
        </div>
        <div class="mode-item mode-toggle-item mode-view-toggle">
          <div class="tgl-track"><div class="tgl-thumb"></div></div>
          <span class="tgl-mode-label">LIST</span>
        </div>
      </div>
    </div>

    <!-- HUD (hidden until first activation) -->
    <div id="hud" hidden>
      <canvas id="ribbon" width="600" height="60"></canvas>

      <!-- Status overlay (top-right corner) -->
      <div id="status-bar">
        <span id="status-stale" hidden>STALE</span>
        <span id="status-age"></span>
      </div>

      <!-- Nearby list: bikes or docks depending on mode -->
      <div id="dock-list" hidden>
        <div class="dock-list-header" id="dock-list-header">NEARBY</div>
        <div id="dock-list-items"></div>
      </div>

      <!-- Timer (top-right corner, START mode) -->
      <div id="timer-display" hidden>
        <span id="ride-elapsed">00:00</span>
        <span id="ride-cost"></span>
      </div>

      <!-- Detail card -->
      <div id="detail-card" hidden>
        <div id="detail-name"></div>
        <div class="detail-row"><span id="detail-count"></span> <span id="detail-label">free</span></div>
        <div class="detail-row"><span id="detail-dist"></span></div>
        <div class="detail-hint">Enter to close</div>
      </div>

      <div id="calibration-banner" hidden>CALIBRATE &#9664;&#9654; offset <span id="cal-offset">0</span>&deg;</div>
      <div id="toast" hidden></div>
    </div>
  </div>

  <!-- Dev harness chrome (outside 600x600 frame; hidden on glasses) -->
  <div id="debug-strip" hidden>
    <span>raw <b id="dbg-raw">–</b></span>
    <span>flt <b id="dbg-flt">–</b></span>
    <span>gps <b id="dbg-gps">–</b></span>
    <span>evt <b id="dbg-rate">–</b>Hz</span>
    <span>fetch <b id="dbg-fetch">–</b>s</span>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
